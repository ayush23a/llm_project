<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanSeva AI — Login</title>
    <meta name="description" content="Login to the Citizen Services Chatbot for Indian Government scheme assistance.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f0f0f;
            color: #e8e8f0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative background */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 107, 53, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(19, 136, 8, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(67, 97, 238, 0.04) 0%, transparent 40%);
            pointer-events: none;
        }

        .title-container {
            text-align: center;
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
        }

        .title-container h1 {
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ff6b35, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .title-container .subtitle {
            color: #8888a0;
            font-size: 1rem;
            font-weight: 400;
        }

        .login-box {
            background-color: #16162a;
            border: 1px solid #1e1e3a;
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .login-box h2 {
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 1.5rem;
            color: #e8e8f0;
        }

        .login-box .login-subtitle {
            color: #8888a0;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .login-box p.label {
            color: #8888a0;
            font-size: 13px;
            margin-bottom: 8px;
            text-align: left;
            font-weight: 500;
        }

        .email-input {
            width: 100%;
            background-color: #0f0f0f;
            border: 1px solid #1e1e3a;
            color: #e8e8f0;
            border-radius: 12px;
            padding: 12px 14px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .email-input::placeholder {
            color: #555;
        }
        .email-input:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .SignIn-btn {
            width: 100%;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: white;
            padding: 12px 0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .SignIn-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1e1e3a;
        }
        .divider span {
            color: #555;
            font-size: 12px;
        }

        .auth-button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #1e1e3a;
            background-color: #1a1a2e;
            color: #e8e8f0;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
        }
        .auth-button:hover {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.08);
            color: #ff6b35;
            transform: translateY(-1px);
        }

        /* Toast */
        .message-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #138808, #1db954);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
            transform: translateX(20px);
            z-index: 1000;
            font-size: 13px;
            font-weight: 500;
        }
        .message-box.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .flag-accent {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
        }
        .flag-accent span {
            width: 24px;
            height: 3px;
            border-radius: 2px;
        }
        .flag-accent .saffron { background: #ff6b35; }
        .flag-accent .white { background: #e8e8f0; }
        .flag-accent .green { background: #138808; }
    </style>
</head>
<body>

    <div class="title-container">
        <h1>🇮🇳 Citizen Services Chatbot</h1>
        <p class="subtitle">Your AI assistant for Indian Government schemes</p>
    </div>

    <div class="login-box">
        <div class="flag-accent">
            <span class="saffron"></span>
            <span class="white"></span>
            <span class="green"></span>
        </div>
        <h2>Welcome</h2>
        <p class="login-subtitle">Sign in to access scheme information & eligibility checks</p>
        <form onsubmit="return false;">
            <p class="label">Email address</p>
            <input type="email" class="email-input" placeholder="you@example.com" required>
            <button id="SignIn" class="SignIn-btn">Sign In</button>

            <div class="divider"><span>or continue with</span></div>

            <div class="grid grid-cols-3 gap-3">
                <button id="google-btn" class="auth-button">Google</button>
                <button id="linkedin-btn" class="auth-button">LinkedIn</button>
                <button id="github-btn" class="auth-button">GitHub</button>
            </div>
        </form>
    </div>

    <div id="messageBox" class="message-box"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const SignIn = document.getElementById('SignIn');
            const googleBtn = document.getElementById('google-btn');
            const linkedinBtn = document.getElementById('linkedin-btn');
            const githubBtn = document.getElementById('github-btn');

            SignIn.addEventListener('click', function() {
                if (validateEmail(document.querySelector('.email-input').value)) {
                    showMessage('Signing in...');
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
                } else {
                    showMessage('Please enter a valid email address.');
                }
            });

            googleBtn.addEventListener('click', () => { showMessage('Redirecting to Google...'); setTimeout(() => { window.location.href = "dashboard.html"; }, 800); });
            linkedinBtn.addEventListener('click', () => { showMessage('Redirecting to LinkedIn...'); setTimeout(() => { window.location.href = "dashboard.html"; }, 800); });
            githubBtn.addEventListener('click', () => { showMessage('Redirecting to GitHub...'); setTimeout(() => { window.location.href = "dashboard.html"; }, 800); });

            function validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            function showMessage(message) {
                const messageBox = document.getElementById('messageBox');
                messageBox.textContent = message;
                messageBox.classList.add('show');
                setTimeout(() => messageBox.classList.remove('show'), 3000);
            }
        });
    </script>

</body>
</html>
