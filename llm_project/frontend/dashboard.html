<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanSeva AI</title>
    <meta name="description" content="AI-powered chatbot for Indian Government schemes — eligibility, benefits, and application guidance.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="chat-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div> <!-- Top Section -->
                <div class="sidebar-header">
                    <h2>🇮🇳 JanSeva AI</h2>
                    <button id="newChatBtn" title="New Chat">+</button>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-action-btn" data-action="schemes" title="Browse Schemes">
                        <span class="qa-icon">📋</span>
                        <span class="qa-label">Schemes</span>
                    </button>
                    <button class="quick-action-btn" data-action="eligibility" title="Check Eligibility">
                        <span class="qa-icon">✅</span>
                        <span class="qa-label">Eligibility</span>
                    </button>
                    <button class="quick-action-btn" data-action="ingest" title="Upload Document">
                        <span class="qa-icon">📄</span>
                        <span class="qa-label">Upload</span>
                    </button>
                </div>

                <div id="chatHistory">
                    <!-- Chat history items will be dynamically added here -->
                </div>
            </div>
            
            <div> <!-- Bottom Section -->
                <div class="profile-container">
                    <div id="profilePopover" class="profile-popover">
                        <p id="popoverUserName">Ayush Aman</p>
                        <button class="popover-button">See profile</button>
                        <button id="SignOut" class="popover-button">Sign out</button>
                    </div>
                    <div id="profileIcon" class="profile-icon-wrapper">
                        <div class="icon" id="profileInitials">AA</div>
                        <span id="profileUserName">Ayush Aman</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Sidebar Toggle Button -->
        <div id="sidebarToggle" title="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </div>

        <main class="main-content">
            
            <header id="chatHeader" class="header">
                <div class="title-container">
                    <h1 id="welcomeMessage">Welcome! Ask about Government Schemes 🇮🇳</h1>
                    <p class="subtitle">Get info on eligibility, benefits, documents & application steps</p>
                </div>
                <div class="suggestion-chips">
                    <button class="chip" data-query="What is PM Kisan scheme and who is eligible?">PM Kisan Eligibility</button>
                    <button class="chip" data-query="How to apply for Pradhan Mantri Awas Yojana?">Apply for PMAY</button>
                    <button class="chip" data-query="What documents are required for Jan Dhan Yojana?">Jan Dhan Documents</button>
                    <button class="chip" data-query="What are the latest government schemes for farmers?">Latest Farmer Schemes</button>
                </div>
            </header>
            
            <!-- Chat Messages Area -->
            <div id="chatArea" class="chat-area">
                <!-- Chat messages will be dynamically added here -->
            </div>
            
            <!-- Chat Input Form -->
            <div class="chat-input-container">
                <div id="attachPopover" class="attach-popover">
                    <div class="attach-popover-item" data-type="Documents">📄 Documents (PDF/TXT)</div>
                    <div class="attach-popover-item" data-type="Ingest">📥 Ingest to Knowledge Base</div>
                </div>
                
                <div id="filePreviewContainer" class="file-preview-wrapper hidden">
                </div>

                <form id="chatForm" class="chat-input-form">
                    <button type="button" id="attachBtn" class="attach-btn" title="Attach file">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </button>

                    <select id="llmModelSelect" class="llm-model-select" title="Select LLM Model">
                        <option value="gemini" selected>Gemini 2.5 Flash</option>
                        <option value="llama">Llama 3.2</option>
                        <option value="gemma">Gemma 2</option>
                    </select>

                    <input type="text" id="chatInput" class="chat-input" placeholder="Ask about any Government scheme..." autocomplete="off">
                    <input type="file" id="fileInput" name="file" style="display: none;" accept=".pdf,.txt,.md"> 
                    <input type="file" id="ingestFileInput" name="ingestFile" style="display: none;" accept=".pdf,.txt,.md">
                    
                    <button type="submit" id="sendBtn" class="send-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">Modal Title</h3>
            <div id="modalBody">
                <!-- Content will be injected here -->
            </div>
            <div class="modal-footer">
                <button id="modalCancelBtn" class="modal-btn modal-btn-secondary">Cancel</button>
                <button id="modalConfirmBtn" class="modal-btn modal-btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="dashboard.js"></script>
</body>
</html>
